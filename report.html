<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAS Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',Calibri,Arial,sans-serif;color:#1B2A4A;line-height:1.7;max-width:700px;margin:0 auto;padding:32px 24px;background:#fff}
        .header{border-bottom:3px solid #CC0000;padding-bottom:16px;margin-bottom:28px;display:flex;justify-content:space-between;align-items:flex-end}
        .header-left{display:flex;align-items:center;gap:12px}
        .logo{width:36px;height:36px;background:#CC0000;border-radius:6px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px}
        .header h1{font-size:1.3rem;color:#1B2A4A;margin:0}
        .header-right{font-size:.75rem;color:#718096;text-align:right}
        .section{margin-bottom:28px}
        .section h2{font-size:1rem;color:#00838F;border-bottom:2px solid #E0F2F1;padding-bottom:6px;margin:0 0 12px}
        .section h3{font-size:.9rem;color:#1B2A4A;margin:16px 0 6px}
        .section p{font-size:.85rem;color:#4A5568;margin:0 0 10px}
        .bullet{padding-left:14px}
        .pre{white-space:pre-line}
        ol{padding-left:20px;font-size:.85rem;color:#4A5568;margin:0 0 12px}
        li{margin-bottom:5px}
        .week-block{background:#F5F7FA;border-radius:8px;padding:16px 20px;margin:10px 0}
        .week-block h3{margin:0 0 8px;font-size:.92rem}
        .sub{margin:8px 0}
        .sub-label{font-size:.75rem;font-weight:600;color:#00838F;margin:0 0 3px;text-transform:uppercase;letter-spacing:.03em}
        .sub p{margin:0 0 8px}
        table{width:100%;border-collapse:collapse;font-size:.82rem;margin:8px 0}
        thead th{background:#1B2A4A;color:#fff;padding:8px 12px;text-align:left;font-size:.78rem;font-weight:500}
        thead th:first-child{border-radius:6px 0 0 0}thead th:last-child{border-radius:0 6px 0 0}
        tbody td{padding:7px 12px;border-bottom:1px solid #E2E8F0;color:#4A5568}
        tbody tr:hover{background:#F5F7FA}
        .footer{margin-top:32px;padding-top:14px;border-top:2px solid #E2E8F0;font-size:.72rem;color:#718096;text-align:center}
        .empty{text-align:center;padding:60px 20px;color:#718096;font-size:.9rem}
        @media print{body{padding:16px}@page{margin:18mm 16mm}}
        @media(max-width:600px){body{padding:16px 14px}.header h1{font-size:1.1rem}}
    </style>
</head>
<body>
    <div id="report-content"><div class="empty">Loading report...</div></div>
    <script>
    function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
    try {
        const hash = window.location.hash.slice(1);
        const json = decodeURIComponent(atob(hash));
        const data = JSON.parse(json);
        let html = '';

        // Header
        html += '<div class="header"><div class="header-left"><div class="logo">I</div><h1>IAS AI Project &mdash; ' + esc(data.title) + '</h1></div>';
        html += '<div class="header-right">Insurance Advisory Service<br>Coach4U<br>' + esc(data.date) + '</div></div>';

        // Core Intent
        if (data.intent) {
            html += '<div class="section"><h2>Core Intent</h2><p>' + esc(data.intent) + '</p></div>';
        }

        // Monthly Goals
        if (data.goals && data.goals.length > 0) {
            html += '<div class="section"><h2>Monthly Goals</h2><ol>' + data.goals.map(g => '<li>' + esc(g) + '</li>').join('') + '</ol></div>';
        }

        // Monthly Plan
        if (data.plan && data.plan.length > 0) {
            html += '<div class="section"><h2>Monthly Plan Overview</h2>';
            data.plan.forEach(w => {
                html += '<h3>Week ' + w.num + ': ' + esc(w.title) + '</h3>';
                w.bullets.forEach(b => { html += '<p class="bullet">&bull; ' + esc(b) + '</p>'; });
            });
            html += '</div>';
        }

        // Weekly Detail
        if (data.weeks && data.weeks.length > 0) {
            html += '<div class="section"><h2>Weekly Reporting</h2>';
            data.weeks.forEach(w => {
                html += '<div class="week-block"><h3>Week ' + w.num + '</h3>';
                if (w.plan) html += '<div class="sub"><p class="sub-label">Plan</p><p>' + esc(w.plan) + '</p></div>';
                if (w.happened) html += '<div class="sub"><p class="sub-label">What Happened</p><p>' + esc(w.happened) + '</p></div>';
                if (w.next) html += '<div class="sub"><p class="sub-label">Next Steps</p><p class="pre">' + esc(w.next) + '</p></div>';
                html += '</div>';
            });
            html += '</div>';
        }

        // Decisions
        if (data.decisions && data.decisions.length > 0) {
            html += '<div class="section"><h2>Decisions &amp; Actions</h2><table><thead><tr><th>Date</th><th>Decision</th><th>Owner</th></tr></thead><tbody>';
            data.decisions.forEach(d => {
                html += '<tr><td>' + esc(d[0]) + '</td><td>' + esc(d[1]) + '</td><td>' + esc(d[2]||'') + '</td></tr>';
            });
            html += '</tbody></table></div>';
        }

        // Value Log
        if (data.valueLog && data.valueLog.length > 0) {
            html += '<div class="section"><h2>Value Log</h2><table><thead><tr><th>Date</th><th>What Was Done</th><th>Outcome</th><th>Time Saved</th></tr></thead><tbody>';
            data.valueLog.forEach(r => {
                html += '<tr><td>' + esc(r[0]||'') + '</td><td>' + esc(r[1]||'') + '</td><td>' + esc(r[2]||'') + '</td><td>' + esc(r[3]||'') + '</td></tr>';
            });
            html += '</tbody></table></div>';
        }

        // Metrics
        if (data.metrics) {
            const labels = {m1:'Email drafting time saved',m2:'Staff adoption of Draft Instructions',m3:'Prompt template usage',m4:'Communication consistency',m5:'Filing system efficiency',m6:"Leah's independence"};
            const keys = Object.keys(data.metrics).filter(k => data.metrics[k]);
            if (keys.length > 0) {
                html += '<div class="section"><h2>Success Metrics</h2><table><thead><tr><th>Metric</th><th>Result</th></tr></thead><tbody>';
                keys.forEach(k => { html += '<tr><td>' + esc(labels[k]||k) + '</td><td>' + esc(data.metrics[k]) + '</td></tr>'; });
                html += '</tbody></table></div>';
            }
        }

        // Notes
        if (data.notes && data.notes.length > 0) {
            html += '<div class="section"><h2>Working Notes</h2>';
            data.notes.forEach(n => {
                html += '<p style="font-size:.75rem;color:#718096;margin:0">' + esc(n.date) + '</p><p>' + esc(n.text) + '</p>';
            });
            html += '</div>';
        }

        // Footer
        html += '<div class="footer">Generated ' + esc(data.date) + ' &bull; IAS Working Folder &bull; Coach4U</div>';

        document.getElementById('report-content').innerHTML = html;
        document.title = 'IAS Report - ' + data.title;
    } catch(e) {
        document.getElementById('report-content').innerHTML = '<div class="empty">No report data found. This link may be incomplete.</div>';
    }
    </script>
</body>
</html>
